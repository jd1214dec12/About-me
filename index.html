<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JD · Digital Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ---- PULSING WHITE GLOWS ---- */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }
        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: -20%;
            left: -20%;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
            bottom: -20%;
            right: -20%;
            animation-delay: 4s;
            animation-direction: alternate-reverse;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.4) translate(40px, 30px); opacity: 0.8; }
        }

        /* ---- GEOMETRIC GRID ---- */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }

        /* ---- GLASS CARD ---- */
        .nexus-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 48px 36px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .nexus-card:hover { transform: translateY(-4px); }

        /* ---- AVATAR ---- */
        .avatar {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ---- TYPOGRAPHY ---- */
        .handle {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .sub-title {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }
        .sub-title i {
            color: #ffffff;
            margin: 0 8px;
            font-size: 6px;
            vertical-align: middle;
            opacity: 0.4;
        }

        /* ---- MUSIC PLAYER (with selector) ---- */
        .music-wrapper {
            margin-bottom: 28px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease;
        }
        .music-wrapper:hover { transform: scale(1.01); }

        .music-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .music-info i { color: #ffffff; font-size: 18px; opacity: 0.7; }
        .music-info .now-playing {
            margin-left: auto;
            font-size: 11px;
            opacity: 0.5;
            font-style: italic;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---- MUSIC SELECTOR (slide menu) ---- */
        .music-selector {
            margin-bottom: 10px;
        }
        .selector-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        .selector-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .selector-btn i { font-size: 14px; opacity: 0.7; }

        /* ---- SLIDE MENU (song list) ---- */
        .song-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .song-menu.open {
            max-height: 500px;
            opacity: 1;
        }
        .song-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 400;
            padding: 10px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: left;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .song-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateX(4px);
        }
        .song-item i { font-size: 14px; opacity: 0.5; width: 20px; }
        .song-item .song-title { flex: 1; }
        .song-item .song-artist { font-size: 11px; opacity: 0.4; }

        #audioPlayer {
            width: 100%;
            height: 40px;
            background: transparent;
            border: none;
            outline: none;
            filter: invert(1) brightness(0.8);
            margin-top: 6px;
        }

        /* ---- FLOATING ANIMATION ---- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .social-btn, .selector-btn {
            animation: float 1.5s ease-in-out infinite;
        }
        .social-btn:nth-child(2) { animation-delay: 0.2s; }
        .social-btn:nth-child(3) { animation-delay: 0.4s; }
        .selector-btn { animation-delay: 0.1s; }

        /* ---- SOCIAL BUTTONS ---- */
        .social-grid { display: flex; flex-direction: column; gap: 14px; }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 18px 20px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .social-btn i { font-size: 26px; width: 32px; transition: transform 0.3s ease; color: #ffffff; opacity: 0.7; }
        .social-btn:hover i { transform: scale(1.15) rotate(-4deg); opacity: 1; }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            transform: scale(1.02) translateY(-3px);
        }

        /* ---- FOOTER ---- */
        .footer-meta {
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
        }
        .footer-meta i { color: rgba(255, 255, 255, 0.3); margin: 0 4px; }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 480px) {
            .nexus-card { padding: 32px 20px 30px; border-radius: 32px; }
            .handle { font-size: 24px; }
            .social-btn { padding: 16px 16px; font-size: 16px; }
            .social-btn i { font-size: 22px; width: 28px; }
            .song-item { font-size: 13px; padding: 8px 14px; }
            .music-info .now-playing { font-size: 10px; max-width: 100px; }
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <div class="nexus-card" id="mainCard">

        <!-- PROFILE PICTURE -->
        <div class="avatar">
            <img src="profile.jpg" alt="JD Avatar" />
        </div>

        <div class="handle">@jd1214dec12</div>
        <div class="sub-title">
            <i class="fas fa-circle"></i> WEB DEVELOPER <i class="fas fa-circle"></i> BUILDER <i class="fas fa-circle"></i> INNOVATOR
        </div>

        <!-- 🎵 MUSIC PLAYER WITH SELECTOR -->
        <div class="music-wrapper">
            <div class="music-info">
                <i class="fas fa-headphones"></i>
                <span>Music Player</span>
                <span class="now-playing" id="nowPlaying">Select a song</span>
            </div>

            <!-- SELECTOR BUTTON (opens/closes menu) -->
            <div class="music-selector">
                <button class="selector-btn" id="toggleMenu">
                    <i class="fas fa-music"></i> Pumili ng Kanta <i class="fas fa-chevron-down" id="menuArrow" style="margin-left:auto; font-size:12px;"></i>
                </button>
            </div>

            <!-- SLIDE MENU (song list) -->
            <div class="song-menu" id="songMenu">
                <div class="song-item" data-song="kalapastangan" data-artist="Fitter Karma" data-title="Kalapastangan">
                    <i class="fas fa-play"></i>
                    <span class="song-title">Kalapastangan</span>
                    <span class="song-artist">— Fitter Karma</span>
                </div>
                <div class="song-item" data-song="imsorrymom" data-artist="Marino" data-title="I'm Sorry Mom">
                    <i class="fas fa-play"></i>
                    <span class="song-title">I'm Sorry Mom</span>
                    <span class="song-artist">— Marino</span>
                </div>
                <div class="song-item" data-song="babydoll" data-artist="BoyWithUke" data-title="Baby Doll">
                    <i class="fas fa-play"></i>
                    <span class="song-title">Baby Doll</span>
                    <span class="song-artist">— BoyWithUke</span>
                </div>
                <div class="song-item" data-song="prairies" data-artist="BoyWithUke" data-title="Prairies">
                    <i class="fas fa-play"></i>
                    <span class="song-title">Prairies</span>
                    <span class="song-artist">— BoyWithUke</span>
                </div>
                <!-- BAGO: MULTO -->
                <div class="song-item" data-song="multo" data-artist="Cup of Joe" data-title="Multo">
                    <i class="fas fa-play"></i>
                    <span class="song-title">Multo</span>
                    <span class="song-artist">— Cup of Joe</span>
                </div>
            </div>

            <!-- AUDIO PLAYER -->
            <audio id="audioPlayer" loop>
                <source src="" type="audio/mpeg" id="audioSource">
                Your browser does not support the audio element.
            </audio>
        </div>

        <!-- SOCIAL LAUNCHPAD -->
        <div class="social-grid">
            <a href="https://www.facebook.com/Jd1214dec12" target="_blank" rel="noopener noreferrer" class="social-btn btn-fb">
                <i class="fab fa-facebook-f"></i> Facebook
                <span style="margin-left:auto; font-size:14px; opacity:0.3;"><i class="fas fa-arrow-up-right-from-square"></i></span>
            </a>
            <a href="https://www.tiktok.com/@jd1214dec12_?_r=1&_t=ZS-97TgX9aQLoI" target="_blank" rel="noopener noreferrer" class="social-btn btn-tt">
                <i class="fab fa-tiktok"></i> TikTok
                <span style="margin-left:auto; font-size:14px; opacity:0.3;"><i class="fas fa-arrow-up-right-from-square"></i></span>
            </a>
            <a href="https://www.instagram.com/jd1214dec12?igsh=MW1zczJmYmhvM2lzYQ==" target="_blank" rel="noopener noreferrer" class="social-btn btn-ig">
                <i class="fab fa-instagram"></i> Instagram
                <span style="margin-left:auto; font-size:14px; opacity:0.3;"><i class="fas fa-arrow-up-right-from-square"></i></span>
            </a>
        </div>

        <div class="footer-meta">
            <i class="fas fa-bolt"></i> SHΔDØW NEXUS <i class="fas fa-bolt"></i>
        </div>

    </div>

    <!-- 🧠 JAVASCRIPT -->
    <script>
        const audio = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const nowPlaying = document.getElementById('nowPlaying');
        const toggleBtn = document.getElementById('toggleMenu');
        const songMenu = document.getElementById('songMenu');
        const menuArrow = document.getElementById('menuArrow');
        const songItems = document.querySelectorAll('.song-item');

        let isMenuOpen = false;
        let currentSong = null;

        // Toggle menu
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isMenuOpen = !isMenuOpen;
            songMenu.classList.toggle('open', isMenuOpen);
            menuArrow.classList.toggle('fa-chevron-down', !isMenuOpen);
            menuArrow.classList.toggle('fa-chevron-up', isMenuOpen);
        });

        // Select song
        songItems.forEach(item => {
            item.addEventListener('click', function() {
                const songFile = this.dataset.song + '.mp3';
                const songTitle = this.dataset.title;
                const songArtist = this.dataset.artist;

                // Update audio source
                audioSource.src = songFile;
                audio.load();
                
                // Play
                audio.muted = false;
                audio.volume = 0.8;
                audio.play().catch(error => {
                    console.log('Playback error:', error);
                });

                // Update now playing display
                nowPlaying.textContent = songTitle + ' — ' + songArtist;
                currentSong = songFile;

                // Close menu after selection
                isMenuOpen = false;
                songMenu.classList.remove('open');
                menuArrow.classList.remove('fa-chevron-up');
                menuArrow.classList.add('fa-chevron-down');

                // Highlight selected
                songItems.forEach(s => s.style.background = 'rgba(255,255,255,0.03)');
                this.style.background = 'rgba(255,255,255,0.12)';
            });
        });

        // Click card to play (if no song selected, do nothing)
        document.getElementById('mainCard').addEventListener('click', function(e) {
            if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.song-item')) return;
            if (currentSong) {
                audio.play().catch(err => console.log(err));
            }
        });

        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.music-wrapper')) {
                if (isMenuOpen) {
                    isMenuOpen = false;
                    songMenu.classList.remove('open');
                    menuArrow.classList.remove('fa-chevron-up');
                    menuArrow.classList.add('fa-chevron-down');
                }
            }
        });
    </script>

</body>
</html>
